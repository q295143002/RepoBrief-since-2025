<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>
  <style>
    :root {
      --bg: #0d1117;
      --card-bg: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --link: #58a6ff;
      --link-hover: #79b8ff;
      --accent: #f78166;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      max-width: 720px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
    }
    nav {
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }
    nav a {
      color: var(--link);
      text-decoration: none;
    }
    nav a:hover { color: var(--link-hover); text-decoration: underline; }
    main { margin-bottom: 2rem; }
    .page-header {
      margin-bottom: 1.75rem;
    }
    .page-header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin: 0 0 0.25rem 0;
      letter-spacing: -0.02em;
    }
    .page-header .subtitle {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin: 0;
    }
    .repo-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .repo-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.15rem;
      transition: border-color 0.15s ease;
    }
    .repo-card:hover { border-color: #484f58; }
    .repo-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.4rem;
    }
    .repo-name {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--link);
      text-decoration: none;
    }
    .repo-name:hover { color: var(--link-hover); text-decoration: underline; }
    .repo-detail-link {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-decoration: none;
      white-space: nowrap;
    }
    .repo-detail-link:hover { color: var(--link); }
    .repo-meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
    }
    .repo-meta .stars { color: var(--accent); }
    .repo-meta .lang {
      background: rgba(110,118,129,0.25);
      padding: 0.15em 0.5em;
      border-radius: 4px;
      font-size: 0.8rem;
    }
    .repo-summary {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin: 0;
      line-height: 1.5;
    }
    footer {
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    footer a { color: var(--link); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <nav>
    <a href="{{ site.baseurl }}/">Home</a>
  </nav>
  <main>
    {{ content }}
  </main>
  <footer>
    Data from github_repos.db. Generated by export script. <a href="https://github.com">GitHub</a>.
  </footer>
</body>
</html>
