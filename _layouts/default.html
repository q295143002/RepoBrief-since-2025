<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 1rem 1.5rem; line-height: 1.5; }
    nav { margin-bottom: 1.5rem; }
    nav a { margin-right: 1rem; }
    footer { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #ccc; font-size: 0.9rem; color: #666; }
  </style>
</head>
<body>
  <nav>
    <a href="{{ site.baseurl }}/">Home</a>
  </nav>
  <main>
    {{ content }}
  </main>
  <footer>
    Data from github_repos.db. Generated by export script. <a href="https://github.com">GitHub</a>.
  </footer>
</body>
</html>
