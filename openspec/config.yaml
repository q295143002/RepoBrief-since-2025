schema: spec-driven

context: |
  项目全局规范与约束 (Project Conventions):
  1. 语言要求：请始终使用【中文】输出所有的提案、规范、设计文档和注释。

rules:
  proposal:
    - 重点关注业务意图：“做什么 (What)” 和 “为什么做 (Why)”。不要在此阶段深入讨论代码实现。
    - 文档结构必须包含“业务目标 (Business Goals)”和“非目标 (Non-goals，即本次迭代明确不做的内容)”两个章节。
    - 提案字数尽量精简，控制在 800 字以内。
    
  specs:
    - 详细描述系统的功能行为。
    - 对于核心的用户交互或业务逻辑，必须使用 Given/When/Then (假设/当/那么) 的 BDD 格式编写测试场景。
    - 必须包含一个专门的“边界情况与异常处理 (Edge Cases & Error Handling)”章节。
    
  design:
    - 重点关注技术实现：“怎么做 (How)”。
    - 必须清晰列出组件树结构，并明确标注哪些是 Server Component，哪些是 Client Component。
    - 涉及表单或数据展示时，必须说明将使用 Ant Design 的哪些具体组件（例如：这里将使用 antd 的 Form 组件，并依赖其内置的 rules 进行校验）。
    - 必须包含数据接口 (API) 的数据结构定义和状态设计。
    
  tasks:
    - 将上述设计拆解为具体的、带有 Markdown 复选框 `[ ]` 的可执行任务清单。
    - 任务粒度必须足够细，每个任务的代码工作量应控制在 1 到 2 小时之内。
    - 任务执行顺序必须符合逻辑：例如，先定义 TS 类型和 API 接口 -> 再开发通用/底层组件 -> 最后组装页面并接入 Ant Design。
    - 任务清单的最后，必须包含进行代码格式化 (Lint) 和基本功能验收的确认节点。