<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title> — 2025 GitHub Trends</title>
  <style>
    :root {
      --bg: #0d1117;
      --card-bg: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --link: #58a6ff;
      --link-hover: #79b8ff;
      --accent: #f78166;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      max-width: 720px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
    }
    nav { margin-bottom: 1.5rem; }
    nav a { color: var(--link); text-decoration: none; }
    nav a:hover { color: var(--link-hover); text-decoration: underline; }
    .meta {
      margin-bottom: 1.5rem;
      padding: 1rem 1.15rem;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
    }
    .meta strong { display: inline-block; margin-right: 0.5rem; }
    .meta span { margin-right: 0.75rem; color: var(--text-muted); }
    .meta a { color: var(--link); }
    .meta .stars { color: var(--accent); }
    main { margin-bottom: 2rem; }
    main h2 { font-size: 1.1rem; margin-top: 1.25rem; margin-bottom: 0.5rem; }
    pre, code { background: var(--card-bg); padding: 0.2em 0.4em; border-radius: 4px; font-size: 0.9em; border: 1px solid var(--border); }
    pre { padding: 1rem; overflow-x: auto; }
  </style>
</head>
<body>
  <nav>
    <a href="/">← Back to list</a>
  </nav>
  <div class="meta">
    <strong></strong>
    
    
    
    
  </div>
  <main>
    
  </main>
  <nav style="margin-top: 2rem;">
    <a href="/">← Back to list</a>
  </nav>
</body>
</html>
